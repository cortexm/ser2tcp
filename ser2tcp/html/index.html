<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>ser2tcp</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header" id="app-header" hidden>
  <div class="header-inner" id="header-inner">
    <a href="#/ports" class="logo">ser2tcp</a>
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">&#9776;</button>
    <div class="mobile-menu-panel" id="mobile-menu-panel">
      <nav id="main-nav">
        <a href="#/ports" class="nav-link" data-hash="/ports">Ports</a>
        <a href="#/users" class="nav-link" data-hash="/users" id="nav-users" hidden>Users</a>
        <a href="#/settings" class="nav-link" data-hash="/settings">Settings</a>
      </nav>
      <div class="header-right">
        <div id="user-btn" class="user-btn" hidden>
          <span class="user-btn-name" id="user-name"></span>
          <span class="user-btn-sep">|</span>
          <button class="user-btn-action" id="logout-btn" type="button">Logout</button>
        </div>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme"></button>
      </div>
    </div>
  </div>
</header>

<div id="login-view" class="page login-page">
  <h2>Login</h2>
  <div id="login-error" class="error hidden"></div>
  <div class="form-group">
    <label for="login-user">Login</label>
    <input type="text" id="login-user" autocomplete="username">
  </div>
  <div class="form-group">
    <label for="login-pass">Password</label>
    <input type="password" id="login-pass" autocomplete="current-password">
  </div>
  <button class="btn btn-primary" id="login-btn">Login</button>
</div>

<div class="content">
  <div id="ports-view" class="page">
    <div class="view-header">
      <h2>Ports</h2>
      <div class="view-header-actions" id="ports-actions"></div>
    </div>
    <div id="ports-content"></div>
    <div id="detected-ports"></div>
  </div>

  <div id="users-view" class="page">
    <div class="view-header">
      <h2>Users &amp; Tokens</h2>
      <div class="view-header-actions" id="users-actions"></div>
    </div>
    <div id="users-content"></div>
  </div>

  <div id="settings-view" class="page">
    <div class="view-header">
      <h2>Settings</h2>
      <div class="view-header-actions" id="settings-actions"></div>
    </div>
    <div id="settings-content"></div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" hidden></div>

<script src="app.js"></script>
</body>
</html>
