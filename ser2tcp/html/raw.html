<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ser2tcp raw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #ccc; font-family: sans-serif;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.toolbar { display: flex; align-items: center; gap: 0.8em;
  padding: 0.4em 0.8em; background: #2d2d2d; border-bottom: 1px solid #444;
  flex-shrink: 0; }
.toolbar .endpoint {
  font-family: monospace; font-size: 0.95em;
  color: #888;
  font-weight: 600;
  transition: color 0.15s;
}
.toolbar .endpoint.endpoint-online  { color: #4c4; }
.toolbar .endpoint.endpoint-offline { color: #888; }
.toolbar .endpoint.endpoint-error   { color: #e55; }
.toolbar button { padding: 0.3em 0.8em; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 0.85em;
  background: #383838; color: #ccc; }
.toolbar button:hover { background: #444; }
.toolbar .btn-connect { background: #4c4; color: #fff; border-color: #4c4; }
.toolbar .btn-connect:hover { background: #3b3; }
.toolbar .btn-disconnect { background: #e55; color: #fff; border-color: #e55; }
.toolbar .btn-disconnect:hover { background: #d44; }
.toolbar .spacer { flex: 1; }
.toolbar .status { font-size: 0.85em; color: #aaa; }
.toolbar a { color: #4a9eff; text-decoration: none; font-size: 0.85em; }
.toolbar a:hover { text-decoration: underline; }

.signal-bar { display: inline-flex; align-items: center; gap: 0.3em;
  flex-shrink: 0; }
.signal-bar.hidden { display: none; }
.signal-badge { display: inline-block; padding: 0.1em 0.4em; border-radius: 3px;
  font-size: 0.75em; font-weight: bold; font-family: monospace; }
.signal-on { background: #4c4; color: #fff; }
.signal-off { background: #444; color: #666; }
.signal-click { cursor: pointer; }
.signal-click:hover { opacity: 0.8; }

#output { flex: 1; overflow-y: auto; padding: 0.5em; font-family: monospace;
  font-size: 14px; line-height: 1.4; white-space: pre-wrap;
  word-break: break-all; background: #1e1e1e; }
.rx { color: #0cc; }
.tx { color: #f90; }
.info { color: #888; font-style: italic; }

#input-row { display: flex; gap: 0.4em; padding: 0.4em;
  background: #2d2d2d; border-top: 1px solid #444; flex-shrink: 0; }
#input { flex: 1; padding: 0.4em; font-family: monospace;
  background: #1e1e1e; color: #ccc; border: 1px solid #555;
  border-radius: 4px; outline: none; }
#input:focus { border-color: #4a9eff; }
#input-row button { padding: 0.4em 1em; background: #4a9eff;
  color: #fff; border: none; border-radius: 4px; cursor: pointer; }
#input-row select { padding: 0.3em; background: #383838;
  color: #ccc; border: 1px solid #555; border-radius: 4px; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="endpoint" id="endpoint-name"></span>
  <span class="signal-bar hidden" id="signal-bar"></span>
  <span class="spacer"></span>
  <span class="status" id="status">Disconnected</span>
  <button id="btn-clear">Clear</button>
  <button id="btn-connect" class="btn-connect">Connect</button>
</div>

<div id="output"></div>
<div id="input-row">
  <select id="line-ending">
    <option value="\r\n">CR+LF</option>
    <option value="\r">CR</option>
    <option value="\n">LF</option>
    <option value="">None</option>
  </select>
  <input type="text" id="input" placeholder="Type to send... (\xHH for hex)">
  <button id="btn-send">Send</button>
</div>

<script>
const $ = id => document.getElementById(id);
const pathParts = location.pathname.split('/raw/');
const endpoint = pathParts[1] || '';
const token = localStorage.getItem('ser2tcp_token');

$('endpoint-name').textContent = '/ws/' + endpoint;
document.title = 'ser2tcp raw \u2014 ' + endpoint;

let ws = null;
let pingInterval = null;
// Distinguishes "device unavailable / proxy refused" from "was connected,
// link dropped" on close — feeds the right-side status text only; the
// left-side endpoint name color is driven by the authoritative server-
// reported port state via the filtered status stream.
let wsEverOpened = false;

function connect() {
  if (ws) return;
  wsEverOpened = false;
  setStatus('connecting');
  const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = scheme + '//' + location.host + '/ws/' + endpoint;
  if (token) url += '?token=' + encodeURIComponent(token);
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    wsEverOpened = true;
    setStatus('online'); appendInfo('Connected');
    // Server's KEEP_ALIVE_TIMEOUT is 15 s — ping more often than that or
    // an idle connection gets torn down with "network connection lost".
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('');
    }, 10000);
  };
  ws.onclose = ev => {
    ws = null;
    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
    if (wsEverOpened) {
      setStatus('offline');
      appendInfo('Disconnected (code: ' + ev.code + ')');
    } else {
      setStatus('error');
      appendInfo('Cannot open connection (device unavailable?)');
    }
  };
  ws.onmessage = ev => {
    if (typeof ev.data === 'string') {
      // Server still sends signal frames over WS (legacy path); we ignore
      // them in favor of the server-authoritative status stream below,
      // which works even when this WS is closed.
      return;
    }
    appendData(new Uint8Array(ev.data), 'rx');
  };
}

function disconnect() {
  if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
  if (ws) { ws.close(); ws = null; setStatus('offline'); }
}

// setStatus reflects this view's WS subscription only: the right-side
// status text + Connect/Disconnect button. The colored endpoint name is
// driven by the server-reported port.state via applyPortState().
function setStatus(state) {
  const labels = {
    connecting: 'Connecting…',
    online: 'Connected',
    offline: 'Disconnected',
    error: 'Unavailable',
  };
  $('status').textContent = labels[state] || state;
  const btn = $('btn-connect');
  if (state === 'online') {
    btn.textContent = 'Disconnect';
    btn.className = 'btn-disconnect';
    btn.onclick = disconnect;
  } else {
    btn.textContent = 'Connect';
    btn.className = 'btn-connect';
    btn.onclick = connect;
  }
}

// Server-driven signal bar. Renders from portCache.signals (populated by
// the filtered status stream below). RTS/DTR remain clickable to toggle —
// the click goes out via WS as a JSON control frame.
function renderSignals() {
  const bar = $('signal-bar');
  const sig = (portCache && portCache.signals) || {};
  const names = Object.keys(sig);
  if (!names.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = '';
  names.forEach(name => {
    const on = sig[name];
    const clickable = name === 'rts' || name === 'dtr';
    const badge = document.createElement('span');
    badge.textContent = name.toUpperCase();
    badge.className = 'signal-badge ' + (on ? 'signal-on' : 'signal-off')
      + (clickable ? ' signal-click' : '');
    if (clickable) {
      badge.title = name.toUpperCase() + ': click to toggle';
      badge.onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({[name]: !on}));
      };
    }
    bar.appendChild(badge);
  });
}

function appendData(data, dir) {
  const out = $('output');
  const span = document.createElement('span');
  span.className = dir;
  let text = '';
  for (let i = 0; i < data.length; i++) {
    const b = data[i];
    if (b >= 0x20 && b < 0x7f) {
      text += String.fromCharCode(b);
    } else if (b === 0x0a) {
      text += '\n';
    } else if (b === 0x0d) {
      if (i + 1 < data.length && data[i + 1] === 0x0a) continue;
      text += '\n';
    } else if (b === 0x09) {
      text += '\t';
    } else {
      text += '[' + b.toString(16).padStart(2, '0') + ']';
    }
  }
  span.textContent = text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

function appendInfo(msg) {
  const out = $('output');
  const span = document.createElement('span');
  span.className = 'info';
  span.textContent = '--- ' + msg + ' ---\n';
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

function parseEscapes(str) {
  const bytes = [];
  for (let i = 0; i < str.length; i++) {
    if (str[i] === '\\' && i + 1 < str.length) {
      const next = str[i + 1];
      if (next === 'x' && i + 3 < str.length) {
        const hex = str.substring(i + 2, i + 4);
        const val = parseInt(hex, 16);
        if (!isNaN(val)) { bytes.push(val); i += 3; continue; }
      }
      if (next === 'n') { bytes.push(0x0a); i++; continue; }
      if (next === 'r') { bytes.push(0x0d); i++; continue; }
      if (next === 't') { bytes.push(0x09); i++; continue; }
      if (next === '0') { bytes.push(0x00); i++; continue; }
      if (next === '\\') { bytes.push(0x5c); i++; continue; }
    }
    bytes.push(str.charCodeAt(i));
  }
  return new Uint8Array(bytes);
}

function send() {
  const inp = $('input');
  const text = inp.value;
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  const lineEnding = $('line-ending').value
    .replace('\\r', '\r').replace('\\n', '\n');
  const data = parseEscapes(text + lineEnding);
  ws.send(data);
  appendData(data, 'tx');
  inp.value = '';
}

$('btn-send').onclick = send;
$('input').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
$('btn-clear').onclick = () => { $('output').innerHTML = ''; };
$('btn-connect').onclick = connect;
$('input').focus();
if (endpoint) connect();

// --- Filtered status stream — server-authoritative port state + signals --
let portCache = null;

function applyPortState() {
  // Endpoint-name color reflects the actual port on the server, not our
  // WS subscription. Right-side status text still tracks our WS state.
  const state = (portCache && portCache.state) || 'offline';
  const ep = $('endpoint-name');
  ep.classList.remove('endpoint-online', 'endpoint-offline', 'endpoint-error');
  ep.classList.add(
    state === 'online' ? 'endpoint-online'
      : state === 'error' ? 'endpoint-error'
      : 'endpoint-offline');
}

function applyStatusLine(line) {
  if (Object.keys(line).length === 0) return; // heartbeat
  if (line.port !== undefined) {
    portCache = line.port ? Object.assign({}, line.port) : null;
  } else if (line._removed) {
    portCache = null;
  } else if (line._delta && portCache) {
    for (const [k, v] of Object.entries(line)) {
      if (k === '_delta') continue;
      if (v === null) delete portCache[k];
      else portCache[k] = v;
    }
  } else {
    return;
  }
  renderSignals();
  applyPortState();
}

function startStatusStream() {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const url = '/api/status?stream=1&endpoint=' + encodeURIComponent(endpoint);
  fetch(url, { headers, cache: 'no-store' })
    .then(async resp => {
      if (!resp.ok || !resp.body) throw new Error('stream HTTP ' + resp.status);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl);
          buf = buf.slice(nl + 1);
          if (!line.trim()) continue;
          try { applyStatusLine(JSON.parse(line)); } catch {}
        }
      }
      throw new Error('stream closed');
    })
    .catch(() => setTimeout(startStatusStream, 2000));
}
startStatusStream();
</script>
</body>
</html>
