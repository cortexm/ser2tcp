<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ser2tcp monitor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #ccc; font-family: sans-serif;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.toolbar { display: flex; align-items: center; gap: 0.8em;
  padding: 0.4em 0.8em; background: #2d2d2d; border-bottom: 1px solid #444;
  flex-shrink: 0; }
.toolbar .endpoint {
  font-family: monospace; font-size: 0.95em;
  color: #888;  /* default — overridden once setStatus runs */
  font-weight: 600;
  transition: color 0.15s;
}
.toolbar .endpoint.endpoint-online  { color: #4c4; }
.toolbar .endpoint.endpoint-offline { color: #888; }
.toolbar .endpoint.endpoint-error   { color: #e55; }
.toolbar button { padding: 0.3em 0.8em; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 0.85em;
  background: #383838; color: #ccc; }
.toolbar button:hover { background: #444; }
.toolbar .btn-connect { background: #4c4; color: #fff; border-color: #4c4; }
.toolbar .btn-connect:hover { background: #3b3; }
.toolbar .btn-disconnect { background: #e55; color: #fff; border-color: #e55; }
.toolbar .btn-disconnect:hover { background: #d44; }
.toolbar .spacer { flex: 1; }
.toolbar .status { font-size: 0.85em; color: #aaa; }
.toolbar a { color: #4a9eff; text-decoration: none; font-size: 0.85em; }
.toolbar a:hover { text-decoration: underline; }
.toolbar label { font-size: 0.85em; display: flex; align-items: center; gap: 0.3em; }

.signal-bar { display: inline-flex; align-items: center; gap: 0.3em;
  flex-shrink: 0; }
.signal-bar.hidden { display: none; }
.signal-badge { display: inline-block; padding: 0.1em 0.4em; border-radius: 3px;
  font-size: 0.75em; font-weight: bold; font-family: monospace; }
.signal-on { background: #4c4; color: #fff; }
.signal-off { background: #444; color: #666; }

#output { flex: 1; overflow-y: auto; padding: 0.5em; font-family: monospace;
  font-size: 14px; line-height: 1.4; white-space: pre-wrap;
  word-break: break-all; background: #1e1e1e; }
.rx { color: #0cc; }
.tx { color: #f90; }
.info { color: #888; font-style: italic; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="endpoint" id="endpoint-name"></span>
  <span class="signal-bar hidden" id="signal-bar"></span>
  <span class="spacer"></span>
  <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
  <span class="status" id="status">Disconnected</span>
  <button id="btn-clear">Clear</button>
  <button id="btn-connect" class="btn-connect">Connect</button>
</div>

<div id="output"></div>

<script>
const $ = id => document.getElementById(id);
const pathParts = location.pathname.split('/monitor/');
const portName = pathParts[1] || '';
const token = localStorage.getItem('ser2tcp_token');

$('endpoint-name').textContent = portName + ' (monitor)';
document.title = 'ser2tcp monitor \u2014 ' + portName;

let ws = null;
let lastDir = 0;
let pingInterval = null;
// Tracks whether the current WS attempt actually reached the OPEN state.
// On close we use this to distinguish "device unavailable / proxy refused"
// (red dot) from "was connected, link dropped" (gray dot).
let wsEverOpened = false;

function connect() {
  if (ws) return;
  wsEverOpened = false;
  setStatus('connecting');
  const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = scheme + '//' + location.host + '/ws/monitor/' + portName;
  if (token) url += '?token=' + encodeURIComponent(token);
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    wsEverOpened = true;
    setStatus('online'); appendInfo('Connected'); lastDir = 0;
    // Server's KEEP_ALIVE_TIMEOUT is 15 s — ping more often than that or
    // an idle connection gets torn down with "network connection lost".
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('');
    }, 10000);
  };
  ws.onclose = ev => {
    ws = null;
    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
    if (wsEverOpened) {
      setStatus('offline');
      appendInfo('Disconnected (code: ' + ev.code + ')');
    } else {
      setStatus('error');
      appendInfo('Cannot open connection (device unavailable?)');
    }
  };
  ws.onmessage = ev => {
    if (typeof ev.data === 'string') return;
    const arr = new Uint8Array(ev.data);
    if (arr.length < 2) return;
    const dir = arr[0];
    const data = arr.slice(1);
    appendData(data, dir);
  };
}

function disconnect() {
  if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
  if (ws) { ws.close(); ws = null; setStatus('offline'); }
}

// Status states match the main app's port card colors:
//   online  — proxy connected & data flowing  (green)
//   offline — proxy idle / cleanly disconnected (gray)
//   error   — couldn't connect at all          (red)
// setStatus only reflects THIS view's WebSocket subscription — status text
// on the right + Connect/Disconnect button. The colored endpoint name on
// the left is driven by the authoritative server-reported port.state via
// applyPortState() so it stays accurate even when our WS bounces.
function setStatus(state) {
  const labels = {
    connecting: 'Connecting…',
    online: 'Connected',
    offline: 'Disconnected',
    error: 'Unavailable',
  };
  $('status').textContent = labels[state] || state;
  const btn = $('btn-connect');
  if (state === 'online') {
    btn.textContent = 'Disconnect';
    btn.className = 'btn-disconnect';
    btn.onclick = disconnect;
  } else {
    btn.textContent = 'Connect';
    btn.className = 'btn-connect';
    btn.onclick = connect;
  }
}

function appendData(data, dir) {
  const out = $('output');
  const dirLabel = dir === 1 ? 'tx' : 'rx';
  // Direction change = new line
  if (lastDir !== 0 && lastDir !== dir) {
    out.appendChild(document.createElement('br'));
  }
  lastDir = dir;
  let text = '';
  const flush = () => {
    if (text) {
      const span = document.createElement('span');
      span.className = dirLabel;
      span.textContent = text;
      out.appendChild(span);
      text = '';
    }
  };
  for (let i = 0; i < data.length; i++) {
    const b = data[i];
    if (b >= 0x20 && b < 0x7f) {
      text += String.fromCharCode(b);
    } else {
      text += '\\x' + b.toString(16).padStart(2, '0').toUpperCase();
    }
  }
  flush();
  if ($('auto-scroll').checked) {
    out.scrollTop = out.scrollHeight;
  }
}

function appendInfo(msg) {
  const out = $('output');
  const span = document.createElement('span');
  span.className = 'info';
  span.textContent = '--- ' + msg + ' ---\n';
  out.appendChild(span);
  lastDir = 0;
  if ($('auto-scroll').checked) {
    out.scrollTop = out.scrollHeight;
  }
}

$('btn-clear').onclick = () => { $('output').innerHTML = ''; lastDir = 0; };
$('btn-connect').onclick = connect;
if (portName) connect();

// --- Live port info via filtered /api/status?stream=1&port=<name> --------
// The /ws/monitor/<name> endpoint only delivers TX/RX direction frames;
// signal state and port health (online/offline/error) aren't part of its
// protocol. We subscribe to the filtered NDJSON status stream — same data
// the main app cards use — to drive the signal bar (RTS/DTR/CTS/DSR/RI/CD)
// AND the colored endpoint name (red/gray/green) reflecting actual port
// state on the server (independent of this monitor's WS state).
let portCache = null;

function renderSignals() {
  const bar = $('signal-bar');
  const sig = (portCache && portCache.signals) || {};
  const names = Object.keys(sig);
  if (!names.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = '';
  names.forEach(name => {
    const on = sig[name];
    const badge = document.createElement('span');
    badge.textContent = name.toUpperCase();
    badge.className = 'signal-badge ' + (on ? 'signal-on' : 'signal-off');
    bar.appendChild(badge);
  });
}

function applyPortState() {
  // Color the endpoint name from the server-reported port state. This is
  // independent of our WS subscription state (status text on the right
  // still tracks that). Lets the user see "is the port itself healthy?"
  // even if their monitor view is between reconnects.
  const state = (portCache && portCache.state) || 'offline';
  const ep = $('endpoint-name');
  ep.classList.remove('endpoint-online', 'endpoint-offline', 'endpoint-error');
  ep.classList.add(
    state === 'online' ? 'endpoint-online'
      : state === 'error' ? 'endpoint-error'
      : 'endpoint-offline');
}

function applyStatusLine(line) {
  if (Object.keys(line).length === 0) return; // heartbeat
  if (line.port !== undefined) {
    // Initial / re-snapshot. line.port may be null (port not found yet).
    portCache = line.port ? Object.assign({}, line.port) : null;
  } else if (line._removed) {
    portCache = null;
  } else if (line._delta && portCache) {
    for (const [k, v] of Object.entries(line)) {
      if (k === '_delta') continue;
      if (v === null) delete portCache[k];
      else portCache[k] = v;
    }
  } else {
    return;
  }
  renderSignals();
  applyPortState();
}

function startStatusStream() {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const url = '/api/status?stream=1&port=' + encodeURIComponent(portName);
  fetch(url, { headers, cache: 'no-store' })
    .then(async resp => {
      if (!resp.ok || !resp.body) throw new Error('stream HTTP ' + resp.status);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl);
          buf = buf.slice(nl + 1);
          if (!line.trim()) continue;
          try { applyStatusLine(JSON.parse(line)); } catch {}
        }
      }
      throw new Error('stream closed');
    })
    .catch(() => setTimeout(startStatusStream, 2000));
}
startStatusStream();
</script>
</body>
</html>
