<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ser2tcp terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #ccc; font-family: sans-serif;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.toolbar { display: flex; align-items: center; gap: 0.8em;
  padding: 0.4em 0.8em; background: #2d2d2d; border-bottom: 1px solid #444;
  flex-shrink: 0; }
.toolbar .endpoint {
  font-family: monospace; font-size: 0.95em;
  color: #888;
  font-weight: 600;
  transition: color 0.15s;
}
.toolbar .endpoint.endpoint-online  { color: #4c4; }
.toolbar .endpoint.endpoint-offline { color: #888; }
.toolbar .endpoint.endpoint-error   { color: #e55; }
.toolbar button { padding: 0.3em 0.8em; border: 1px solid #555;
  border-radius: 4px; cursor: pointer; font-size: 0.85em;
  background: #383838; color: #ccc; }
.toolbar button:hover { background: #444; }
.toolbar .btn-connect { background: #4c4; color: #fff; border-color: #4c4; }
.toolbar .btn-connect:hover { background: #3b3; }
.toolbar .btn-disconnect { background: #e55; color: #fff; border-color: #e55; }
.toolbar .btn-disconnect:hover { background: #d44; }
.toolbar .spacer { flex: 1; }
.toolbar .status { font-size: 0.85em; color: #aaa; }
.toolbar a { color: #4a9eff; text-decoration: none; font-size: 0.85em; }
.toolbar a:hover { text-decoration: underline; }

.signal-bar { display: inline-flex; align-items: center; gap: 0.3em;
  flex-shrink: 0; }
.signal-bar.hidden { display: none; }
.signal-badge { display: inline-block; padding: 0.1em 0.4em; border-radius: 3px;
  font-size: 0.75em; font-weight: bold; font-family: monospace; }
.signal-on { background: #4c4; color: #fff; }
.signal-off { background: #444; color: #666; }
.signal-click { cursor: pointer; }
.signal-click:hover { opacity: 0.8; }

#terminal-container { flex: 1; overflow: hidden; }
#terminal-container .xterm { height: 100%; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="endpoint" id="endpoint-name"></span>
  <span class="signal-bar hidden" id="signal-bar"></span>
  <span class="spacer"></span>
  <span class="status" id="status">Disconnected</span>
  <button id="btn-clear">Clear</button>
  <button id="btn-connect" class="btn-connect">Connect</button>
</div>

<div id="terminal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const pathParts = location.pathname.split('/xterm/');
const endpoint = pathParts[1] || '';
const token = localStorage.getItem('ser2tcp_token');

$('endpoint-name').textContent = '/ws/' + endpoint;
document.title = 'ser2tcp \u2014 ' + endpoint;

let ws = null;
let pingInterval = null;
// Tracks whether THIS view's WS reached OPEN; feeds the right-side status
// text only. Endpoint-name color is driven by the authoritative server-
// reported port.state (see filtered status stream at the bottom).
let wsEverOpened = false;

const term = new Terminal({
  cursorBlink: true,
  scrollback: 10000,
  fontSize: 14,
  theme: {
    background: '#1e1e1e',
    foreground: '#cccccc',
    cursor: '#cccccc',
    selectionBackground: '#264f78',
  },
});
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open($('terminal-container'));
fitAddon.fit();

term.onData(data => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(new TextEncoder().encode(data));
  }
});

window.addEventListener('resize', () => fitAddon.fit());

function connect() {
  if (ws) return;
  wsEverOpened = false;
  setStatus('connecting');
  const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let url = scheme + '//' + location.host + '/ws/' + endpoint;
  if (token) url += '?token=' + encodeURIComponent(token);
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    wsEverOpened = true;
    setStatus('online');
    // Server keeps the connection alive only while there's traffic;
    // KEEP_ALIVE_TIMEOUT in uhttp is 15 s. Send an empty frame every
    // 10 s so an idle terminal (no typing, no output) doesn't get torn
    // down by the server with "The network connection was lost".
    pingInterval = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('');
    }, 10000);
  };
  ws.onclose = () => {
    ws = null;
    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
    setStatus(wsEverOpened ? 'offline' : 'error');
  };
  ws.onmessage = ev => {
    if (typeof ev.data === 'string') {
      // Server still sends signal frames over WS (legacy path); we ignore
      // them in favor of the server-authoritative status stream below,
      // which works even when this WS is closed.
      return;
    }
    term.write(new Uint8Array(ev.data));
  };
}

function disconnect() {
  if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
  if (ws) { ws.close(); ws = null; setStatus('offline'); }
}

// setStatus reflects this view's WS subscription only (right-side status
// text + Connect/Disconnect button). Endpoint-name color is driven by
// the server-reported port.state via applyPortState().
function setStatus(state) {
  const labels = {
    connecting: 'Connecting…',
    online: 'Connected',
    offline: 'Disconnected',
    error: 'Unavailable',
  };
  $('status').textContent = labels[state] || state;
  const btn = $('btn-connect');
  if (state === 'online') {
    btn.textContent = 'Disconnect';
    btn.className = 'btn-disconnect';
    btn.onclick = disconnect;
  } else {
    btn.textContent = 'Connect';
    btn.className = 'btn-connect';
    btn.onclick = connect;
  }
}

// Server-driven signal bar (populated by filtered status stream).
// RTS/DTR remain clickable to toggle via WS control frame.
function renderSignals() {
  const bar = $('signal-bar');
  const sig = (portCache && portCache.signals) || {};
  const names = Object.keys(sig);
  if (!names.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = '';
  names.forEach(name => {
    const on = sig[name];
    const clickable = name === 'rts' || name === 'dtr';
    const badge = document.createElement('span');
    badge.textContent = name.toUpperCase();
    badge.className = 'signal-badge ' + (on ? 'signal-on' : 'signal-off')
      + (clickable ? ' signal-click' : '');
    if (clickable) {
      badge.title = name.toUpperCase() + ': click to toggle';
      badge.onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({[name]: !on}));
      };
    }
    bar.appendChild(badge);
  });
}

$('btn-clear').onclick = () => term.clear();
$('btn-connect').onclick = connect;
if (endpoint) connect();

// --- Filtered status stream — server-authoritative port state + signals --
let portCache = null;

function applyPortState() {
  const state = (portCache && portCache.state) || 'offline';
  const ep = $('endpoint-name');
  ep.classList.remove('endpoint-online', 'endpoint-offline', 'endpoint-error');
  ep.classList.add(
    state === 'online' ? 'endpoint-online'
      : state === 'error' ? 'endpoint-error'
      : 'endpoint-offline');
}

function applyStatusLine(line) {
  if (Object.keys(line).length === 0) return; // heartbeat
  if (line.port !== undefined) {
    portCache = line.port ? Object.assign({}, line.port) : null;
  } else if (line._removed) {
    portCache = null;
  } else if (line._delta && portCache) {
    for (const [k, v] of Object.entries(line)) {
      if (k === '_delta') continue;
      if (v === null) delete portCache[k];
      else portCache[k] = v;
    }
  } else {
    return;
  }
  renderSignals();
  applyPortState();
}

function startStatusStream() {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const url = '/api/status?stream=1&endpoint=' + encodeURIComponent(endpoint);
  fetch(url, { headers, cache: 'no-store' })
    .then(async resp => {
      if (!resp.ok || !resp.body) throw new Error('stream HTTP ' + resp.status);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl);
          buf = buf.slice(nl + 1);
          if (!line.trim()) continue;
          try { applyStatusLine(JSON.parse(line)); } catch {}
        }
      }
      throw new Error('stream closed');
    })
    .catch(() => setTimeout(startStatusStream, 2000));
}
startStatusStream();
</script>
</body>
</html>
